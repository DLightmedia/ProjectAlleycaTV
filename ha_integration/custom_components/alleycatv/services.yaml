play_zone:
  name: Play Zone
  description: Resume playlist playback on all Pis in a zone.
  fields:
    zone_id:
      name: Zone ID
      description: The ID of the target zone (e.g. "zone-lobby").
      required: true
      example: "zone-lobby"
      selector:
        text:

stop_zone:
  name: Stop Zone
  description: Stop playback on all Pis in a zone.
  fields:
    zone_id:
      name: Zone ID
      description: The ID of the target zone.
      required: true
      example: "zone-lobby"
      selector:
        text:

interrupt_zone:
  name: Interrupt Zone
  description: >
    Immediately play an announcement file on all Pis in a zone,
    then automatically resume the playlist.
  fields:
    zone_id:
      name: Zone ID
      description: The ID of the target zone.
      required: true
      example: "zone-lobby"
      selector:
        text:
    file_url:
      name: Announcement URL
      description: >
        Full HTTP URL of the announcement file on the AlleycaTV server,
        e.g. http://192.168.1.100/media/announcements/alert.mp4
      required: true
      example: "http://192.168.1.100/media/announcements/last-call.mp4"
      selector:
        text:

interrupt_pi:
  name: Interrupt Pi
  description: >
    Immediately play an announcement file on a single Raspberry Pi,
    then automatically resume its playlist.
  fields:
    pi_id:
      name: Pi ID
      description: The unique ID of the target Pi (e.g. "pi-lobby-1").
      required: true
      example: "pi-lobby-1"
      selector:
        text:
    file_url:
      name: Announcement URL
      description: Full HTTP URL of the announcement file.
      required: true
      example: "http://192.168.1.100/media/announcements/last-call.mp4"
      selector:
        text:

reload_playlist:
  name: Reload Playlist
  description: Tell all Pis in a zone to re-fetch their playlist from the server.
  fields:
    zone_id:
      name: Zone ID
      description: The ID of the target zone.
      required: true
      example: "zone-lobby"
      selector:
        text:

set_volume_zone:
  name: Set Volume (Zone)
  description: Set the playback volume on all Pis in a zone.
  fields:
    zone_id:
      name: Zone ID
      description: The ID of the target zone.
      required: true
      example: "zone-lobby"
      selector:
        text:
    volume:
      name: Volume
      description: Volume level (0–100).
      required: true
      default: 80
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
