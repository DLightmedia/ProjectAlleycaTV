##############################################################################
# AlleycaTV nginx configuration
# Place at: /etc/nginx/sites-available/alleycatv
# Enable:   ln -s /etc/nginx/sites-available/alleycatv /etc/nginx/sites-enabled/
##############################################################################

server {
    listen 80;
    server_name _;   # Respond to any hostname / IP

    # ── Static media files ────────────────────────────────────────────────────
    # Pis pull video and photo files directly from here.
    # Files live in /opt/alleycatv/media/{videos,photos,announcements}/
    location /media/ {
        alias /opt/alleycatv/media/;
        autoindex off;

        # Allow large files without buffering into nginx memory
        sendfile        on;
        tcp_nopush      on;
        tcp_nodelay     on;

        # Cache headers — Pis buffer ahead, so moderate caching is fine
        expires 1h;
        add_header Cache-Control "public, max-age=3600";

        # CORS for panel access
        add_header Access-Control-Allow-Origin *;
    }

    # ── REST API (FastAPI / uvicorn on port 8000) ─────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;

        # Allow large uploads (500 MB default, matches MAX_UPLOAD_MB in config.py)
        client_max_body_size 512M;
    }

    # ── Health check passthrough ──────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # ── Content management UI ─────────────────────────────────────────────────
    location /manage {
        proxy_pass         http://127.0.0.1:8000/manage;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Block direct access to anything else
    location / {
        return 404;
    }
}
